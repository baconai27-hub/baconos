# BaconOS Kernel & System Performance Tuning
# /etc/sysctl.d/99-baconos.conf
# Applied at boot via systemd-sysctl

# ═══════════════════════════════════════════════════════════════════════════════
# VIRTUAL MEMORY
# ═══════════════════════════════════════════════════════════════════════════════

# Aggressively use ZRAM swap before falling back to disk
vm.swappiness = 180

# Reduce dirty page writeback pressure (better for SSDs)
vm.dirty_ratio = 10
vm.dirty_background_ratio = 3
vm.dirty_expire_centisecs = 3000
vm.dirty_writeback_centisecs = 500

# Transparent huge pages — defer allocation for better latency
vm.nr_hugepages = 0

# Reduce VFS cache pressure (keep file metadata in RAM longer)
vm.vfs_cache_pressure = 50

# Allow more memory-mapped files (needed for some IDEs/games)
vm.max_map_count = 2147483642

# ═══════════════════════════════════════════════════════════════════════════════
# NETWORK
# ═══════════════════════════════════════════════════════════════════════════════

# Use BBR congestion control (faster downloads, better streaming)
net.core.default_qdisc = fq
net.ipv4.tcp_congestion_control = bbr

# Increase socket buffer sizes
net.core.rmem_default = 262144
net.core.wmem_default = 262144
net.core.rmem_max = 134217728
net.core.wmem_max = 134217728
net.core.optmem_max = 65536

net.ipv4.tcp_rmem = 4096 87380 67108864
net.ipv4.tcp_wmem = 4096 65536 67108864
net.ipv4.tcp_mem = 65536 131072 262144

# TCP Fast Open (reduce handshake latency)
net.ipv4.tcp_fastopen = 3

# Keep connections alive longer
net.ipv4.tcp_keepalive_time = 60
net.ipv4.tcp_keepalive_intvl = 10
net.ipv4.tcp_keepalive_probes = 6

# SYN backlog (better under load)
net.core.somaxconn = 8192
net.core.netdev_max_backlog = 16384
net.ipv4.tcp_max_syn_backlog = 8192

# Reduce TIME_WAIT connections
net.ipv4.tcp_fin_timeout = 10
net.ipv4.tcp_tw_reuse = 1

# Harden against SYN flood
net.ipv4.tcp_syncookies = 1

# ═══════════════════════════════════════════════════════════════════════════════
# SECURITY
# ═══════════════════════════════════════════════════════════════════════════════

# Disable IPv4 source routing
net.ipv4.conf.all.accept_source_route = 0
net.ipv4.conf.default.accept_source_route = 0

# Disable ICMP redirects
net.ipv4.conf.all.accept_redirects = 0
net.ipv4.conf.default.accept_redirects = 0
net.ipv4.conf.all.secure_redirects = 0

# Log martian packets
net.ipv4.conf.all.log_martians = 1

# Disable IP forwarding (desktop, not a router)
net.ipv4.ip_forward = 0

# Restrict dmesg to root
kernel.dmesg_restrict = 1

# Restrict kernel pointers in /proc
kernel.kptr_restrict = 1

# Randomize address space (ASLR)
kernel.randomize_va_space = 2

# ═══════════════════════════════════════════════════════════════════════════════
# KERNEL / SCHEDULER
# ═══════════════════════════════════════════════════════════════════════════════

# Increase inotify limits (for IDEs like VS Code, JetBrains)
fs.inotify.max_user_watches = 524288
fs.inotify.max_user_instances = 1024

# Increase open file limits
fs.file-max = 2097152
fs.nr_open = 1048576

# Magic SysRq key (useful for debugging — enable selective)
kernel.sysrq = 1

# Reduce kernel panic reboot timer (auto-reboot after 60s on panic)
kernel.panic = 60
kernel.panic_on_oops = 1
