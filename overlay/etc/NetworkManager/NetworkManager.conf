# BaconOS NetworkManager configuration
# /etc/NetworkManager/NetworkManager.conf

[main]
plugins=ifupdown,keyfile
dns=systemd-resolved
rc-manager=symlink

[ifupdown]
managed=false

[keyfile]
# Store connection profiles in /etc/NetworkManager/system-connections/
unmanaged-devices=none

[connectivity]
uri=http://connectivity-check.ubuntu.com/
response=NetworkManager is online
interval=300

[logging]
# Uncomment for verbose NM debugging:
# level=DEBUG
# domains=ALL
level=WARN
domains=DEFAULT

[device]
# Prefer kernel Wi-Fi driver management
wifi.backend=wpa_supplicant
wifi.scan-rand-mac-address=yes      # Randomize MAC on scans (privacy)

[connection]
# Default connection settings for all new connections
connection.stable-id=${CONNECTION}/${BOOT}
wifi.cloned-mac-address=stable      # Stable MAC per SSID (privacy)
ethernet.cloned-mac-address=stable
ipv6.ip6-privacy=2                  # Enable IPv6 temporary addresses
