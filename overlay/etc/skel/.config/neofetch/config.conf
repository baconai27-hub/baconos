# BaconOS — Custom neofetch configuration
# Place at: ~/.config/neofetch/config.conf

print_info() {
    info title
    info underline

    info "OS        " distro
    info "Host      " model
    info "Kernel    " kernel
    info "Uptime    " uptime
    info "Packages  " packages
    info "Shell     " shell
    info "Resolution" resolution
    info "DE        " de
    info "WM        " wm
    info "WM Theme  " wm_theme
    info "Theme     " theme
    info "Icons     " icons
    info "Terminal  " term
    info "CPU       " cpu
    info "GPU       " gpu
    info "Memory    " memory
    info "Disk      " disk

    info cols
}

# Title
title_fqdn="off"

# Kernel
kernel_shorthand="on"

# Distro
distro_shorthand="off"
os_arch="on"

# Uptime
uptime_shorthand="tiny"

# Memory
memory_percent="on"
memory_unit="mib"

# Packages
package_managers="on"

# Shell
shell_path="off"
shell_version="on"

# CPU
speed_type="bios_limit"
speed_shorthand="on"
cpu_brand="on"
cpu_speed="on"
cpu_cores="logical"
cpu_temp="C"

# GPU
gpu_brand="on"
gpu_type="all"

# Resolution
refresh_rate="on"

# Gtk Theme / Icons / Font
gtk_shorthand="on"
gtk2="on"
gtk3="on"

# IP Address
public_ip_host="http://ident.me"
public_ip_timeout=2

# Disk
disk_show=('/')
disk_subtitle="mount"
disk_percent="on"

# Song
music_player="auto"
song_format="%artist% - %album% - %title%"
song_shorthand="off"

# Colors
colors=(196 208 226 118 39 135)   # BaconOS palette: red orange yellow green blue purple

bold="on"
underline_enabled="on"
underline_char="─"
separator=" ➜"

# Color blocks
block_range=(0 15)
color_blocks="on"
block_width=3
block_height=1
col_offset="auto"

# Progress bars
bar_char_elapsed="━"
bar_char_total="─"
bar_border="on"
bar_length=15
bar_color_elapsed="distro"
bar_color_total="distro"

cpu_display="barinfo"
memory_display="barinfo"
battery_display="barinfo"
disk_display="barinfo"

# Image backend
image_backend="ascii"
image_source="auto"
ascii_distro="auto"
ascii_colors=(196 208 226 118 39 135)
ascii_bold="on"

image_loop="off"
thumbnail_dir="${XDG_CACHE_HOME:-${HOME}/.cache}/thumbnails/neofetch"
crop_mode="normal"
crop_offset="center"
image_size="auto"
gap=3
yoffset=0
xoffset=0
background_color=

# Stdout mode
stdout="off"
