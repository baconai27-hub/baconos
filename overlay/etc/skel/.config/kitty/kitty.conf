# BaconOS — Kitty Terminal Configuration
# Place at: ~/.config/kitty/kitty.conf

# ── Fonts ──────────────────────────────────────────────────────────────────────
font_family      JetBrainsMono Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        13.0
force_ltr        no

# ── Scrollback ────────────────────────────────────────────────────────────────
scrollback_lines 10000
scrollback_pager less --chop-long-lines --RAW-CONTROL-CHARS +INPUT_LINE_NUMBER

# ── Mouse ─────────────────────────────────────────────────────────────────────
mouse_hide_wait 3.0
url_color #ff8c00
url_style curly
open_url_with default
url_prefixes file ftp ftps gemini git http https irc ircs kitty mailto news sftp ssh
detect_urls yes
copy_on_select yes

# ── Performance ────────────────────────────────────────────────────────────────
repaint_delay    10
input_delay      3
sync_to_monitor  yes

# ── Terminal bell ──────────────────────────────────────────────────────────────
enable_audio_bell no
visual_bell_duration 0.0
visual_bell_color none
window_alert_on_bell yes
bell_on_tab "🔔 "
command_on_bell none

# ── Window ────────────────────────────────────────────────────────────────────
remember_window_size  yes
initial_window_width  1200
initial_window_height 720
enabled_layouts *
window_resize_step_cells 2
window_resize_step_lines 2
window_border_width 0.5pt
draw_minimal_borders yes
window_margin_width 0
single_window_margin_width -1
window_padding_width 12
placement_strategy center
active_border_color   #ff8c00
inactive_border_color #2a2a2a
bell_border_color     #ff5f5f
inactive_text_alpha   0.8
hide_window_decorations no
window_logo_path none
window_logo_position bottom-right
window_logo_alpha 0.5
resize_debounce_time 0.1
resize_draw_strategy static
resize_in_steps no
visual_window_select_characters 1234567890ABCDEFGHIJKLMNOPQRSTUVWXYZ
confirm_os_window_close 2

# ── Tab bar ────────────────────────────────────────────────────────────────────
tab_bar_edge bottom
tab_bar_margin_width 0.0
tab_bar_margin_height 0.0 0.0
tab_bar_style powerline
tab_bar_align left
tab_bar_min_tabs 2
tab_switch_strategy previous
tab_fade 0.25 0.5 0.75 1
tab_separator " ┇"
tab_powerline_style slanted
tab_activity_symbol none
tab_title_max_length 0
tab_title_format "{fmt.fg.red}{bell_symbol}{activity_symbol}{fmt.fg.tab}{index}: {title}"
active_tab_foreground   #1a1a1a
active_tab_background   #ff8c00
active_tab_font_style   bold
inactive_tab_foreground #aaaaaa
inactive_tab_background #2a2a2a
inactive_tab_font_style normal
tab_bar_background      #1a1a1a
tab_bar_margin_color    none

# ── BaconOS Color Theme ────────────────────────────────────────────────────────
# Dark background with warm bacon-amber accents

foreground            #e8d5b7
background            #1a1008
selection_foreground  #1a1008
selection_background  #ff8c00

# Cursor
cursor                #ff8c00
cursor_text_color     #1a1008
cursor_shape          beam
cursor_beam_thickness 1.5
cursor_blink_interval -1
cursor_stop_blinking_after 15.0

# Black
color0  #1a1a1a
color8  #555555

# Red
color1  #e05252
color9  #ff6b6b

# Green
color2  #87c45a
color10 #b6f080

# Yellow  (Bacon sizzle gold)
color3  #e8a838
color11 #ffc962

# Blue
color4  #5b9bd5
color12 #7dc4f0

# Magenta
color5  #c07ab8
color13 #e09de0

# Cyan
color6  #5cbcb4
color14 #7ed9d2

# White
color7  #d4c5a9
color15 #fffaf0

# ── Advanced ──────────────────────────────────────────────────────────────────
shell                 /usr/bin/zsh
editor                nano
close_on_child_death  no
allow_remote_control  yes
listen_on             none
update_check_interval 0
startup_session       none
clipboard_control     write-clipboard write-primary read-clipboard-ask read-primary-ask
clipboard_max_size    64
allow_hyperlinks      yes
shell_integration     enabled
allow_cloning         ask
clone_source_strategies venv,conda,env_var,path
term                  xterm-kitty

# ── Keybindings ────────────────────────────────────────────────────────────────
map ctrl+shift+c        copy_to_clipboard
map ctrl+shift+v        paste_from_clipboard
map ctrl+shift+t        new_tab_with_cwd
map ctrl+shift+w        close_tab
map ctrl+shift+right    next_tab
map ctrl+shift+left     previous_tab
map ctrl+shift+enter    new_window_with_cwd
map ctrl+shift+equal    change_font_size all +1.0
map ctrl+shift+minus    change_font_size all -1.0
map ctrl+shift+0        change_font_size all 0
map ctrl+shift+f        show_scrollback
map ctrl+shift+h        show_last_command_output
map ctrl+shift+s        toggle_layout stack
